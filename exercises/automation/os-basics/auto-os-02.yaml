id: auto-os-02
title: 列出目录内容 - os.listdir()
difficulty: 1
category: os-basics
description: |
  os.listdir() 返回指定目录下的所有文件和文件夹名称。
  不指定路径则默认当前目录。

  请列出当前目录下的所有内容，并输出总数
expected_output: |
  目录内容: ['file1.txt', 'file2.py', 'folder1', 'folder2']
  总数: 4
starter_code: |
  import os

  # 用 os.listdir() 列出当前目录内容
  # 提示: items = os.listdir('.')
  items = ['file1.txt', 'file2.py', 'folder1', 'folder2']

  # 输出内容和总数
  print(f"目录内容: {items}")
  print(f"总数: {len(items)}")

solution: |
  import os
  items = os.listdir('.')
  print(f"目录内容: {items}")
  print(f"总数: {len(items)}")
