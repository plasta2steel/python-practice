  Result: 500000500000
starter_code: |
  import time
  from contextlib import contextmanager
  
  @contextmanager
  def timer():
      # 实现计时上下文管理器
      pass
  
  with timer() as t:
      result = sum(range(1, 1000001))
  print(f'Result: {result}')
