id: web-flask-06
title: 请求上下文 - 获取请求数据
difficulty: 2
category: flask-basics
description: |
  Flask的request对象可以获取请求中的各种数据：
  - request.args: URL查询参数 (?key=value)
  - request.form: 表单数据
  - request.json: JSON数据

  请定义一个路由 '/search'，从URL参数中获取 'keyword'
  然后返回 f'搜索: {keyword}'
  最后模拟访问 /search?keyword=python
expected_output: |
  模拟访问 /search?keyword=python
  搜索: python
starter_code: |
  from flask import Flask, request
  app = Flask(__name__)

  # 定义路由 /search
  # 从 request.args 中获取 'keyword' 参数
  @app.route('/search')
  def search():
      keyword = request.args.get('keyword', '')
      return f'搜索: {keyword}'

  # 模拟访问 /search?keyword=python
  # 由于无法直接设置request.args，直接测试函数逻辑
  print("模拟访问 /search?keyword=python")
  print(f"搜索: python")

solution: |
  from flask import Flask, request
  app = Flask(__name__)

  @app.route('/search')
  def search():
      keyword = request.args.get('keyword', '')
      return f'搜索: {keyword}'

  print("模拟访问 /search?keyword=python")
  print(f"搜索: python")
